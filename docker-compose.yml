services:
  db:
    image: postgres:15-alpine
    container_name: appreviews_db
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES__DATABASE:-app_reviews}
      - POSTGRES_USER=${POSTGRES__USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES__PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES__USER:-postgres} -d ${POSTGRES__DATABASE:-app_reviews}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: appstore_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES__HOST=db
    # entrypoint.sh handles migrations and starts the api by default

volumes:
  postgres_data:
